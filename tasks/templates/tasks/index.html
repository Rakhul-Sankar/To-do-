{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Instant redirect -->
  <meta http-equiv="refresh" content="0; url={% url 'login' %}">

  <!-- Optional favicon -->
  <!-- <link rel="icon" href="{% static 'images/logo.png' %}"> -->

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center">

  <div class="text-center animate-pulse">

    <!-- Optional Logo -->
    <!-- <img src="{% static 'images/logo.png' %}" class="w-20 mx-auto mb-4" alt="Logo"> -->

    <h1 class="text-xl font-semibold text-gray-700 mb-2">
      To-Do App
    </h1>

    <div class="flex justify-center">
      <div class="h-6 w-6 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <p class="text-gray-500 mt-3 text-sm">
      Redirecting to login...
    </p>

    <noscript>
      <p class="mt-4 text-red-600">
        JavaScript is disabled.
        <a href="{% url 'login' %}" class="underline text-blue-600">Click here</a>.
      </p>
    </noscript>
  </div>

  <script>
    window.location.replace("{% url 'login' %}");
  </script>

</body>
</html>
